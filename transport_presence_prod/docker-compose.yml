services:
  transport-detector:
    build: .
    container_name: transport-detector
    ports:
      - "8000:8000"
    environment:
      MODEL_PATH: yolov8n.pt
      DEVICE: cpu
      ROI: 100,300,600,450
      FRAME_STRIDE: 2
      OUTPUT_DIR: /app/outputs
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
